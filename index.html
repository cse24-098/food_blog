<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Food Blog</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Your Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ========================================== -->
    <!-- HEADER / NAVIGATION                       -->
    <!-- ========================================== -->
    <header class="header">
        <div class="container">
            <!-- Logo -->
            <div class="logo">
                <h1>
                    <i class="fa-solid fa-bowl-food"></i> Food Blog
                </h1>
            </div>

            <!-- Navigation -->
            <nav class="nav">
                <a href="index.html" class="active">Home</a>
                <a href="recipes.html">Recipes</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>

            <!-- User Profile Icon -->
            <div class="user-profile">
                <a href="login.html" aria-label="Login or Sign up">
                    <i class="fa-solid fa-circle-user"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- HERO SECTION                              -->
    <!-- ========================================== -->
    <section class="hero">
        <img src="images/hero_image.webp" alt="Delicious food spread on a table" />
        <h2>Welcome to My Food Blog</h2>
        <p>Discover delicious recipes and cooking tips!</p>
    </section>

    <!-- ========================================== -->
    <!-- RECIPE GRID                               -->
    <!-- ========================================== -->
    <main>
        <div class="grid-container">
            <!-- Recipe Card 1 -->
            <article class="grid-item">
                <img src="https://picsum.photos/seed/recipe1/400/250" alt="Delicious pasta dish" />
                <h2>Recipe 1</h2>
            </article>

            <!-- Recipe Card 2 -->
            <article class="grid-item">
                <img src="https://picsum.photos/seed/recipe2/400/250" alt="Fresh salad bowl" />
                <h2>Recipe 2</h2>
            </article>

            <!-- Recipe Card 3 -->
            <article class="grid-item">
                <img src="https://picsum.photos/seed/recipe3/400/250" alt="Hearty soup" />
                <h2>Recipe 3</h2>
            </article>

            <!-- Recipe Card 4 -->
            <article class="grid-item">
                <img src="https://picsum.photos/seed/recipe4/400/250" alt="Grilled steak" />
                <h2>Recipe 4</h2>
            </article>

            <!-- Recipe Card 5 -->
            <article class="grid-item">
                <img src="https://picsum.photos/seed/recipe5/400/250" alt="Chocolate cake" />
                <h2>Recipe 5</h2>
            </article>

            <!-- Recipe Card 6 -->
            <article class="grid-item">
                <img src="https://picsum.photos/seed/recipe6/400/250" alt="Smoothie bowl" />
                <h2>Recipe 6</h2>
            </article>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- FOOTER                                    -->
    <!-- ========================================== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 My Food Blog. Made with <i class="fa-solid fa-heart" style="color: #ff6b35;"></i> and lots of seasoning.</p>
                <div class="social-links">
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" aria-label="Pinterest"><i class="fa-brands fa-pinterest"></i></a>
                    <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>

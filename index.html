<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Food Blog</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Yuyu+Short&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Your Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ========================================== -->
    <!-- HEADER / NAVIGATION                       -->
    <!-- ========================================== -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>
                    <i class="fa-solid fa-bowl-food"></i> Food Blog
                </h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="active">Home</a>
                <a href="recipes.html">Recipes</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="user-profile">
                <a href="login.html" aria-label="Login or Sign up">
                    <i class="fa-regular fa-user" style="color: #f9a826;"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- HERO SECTION WITH OVERLAID SEARCH         -->
    <!-- ========================================== -->
    <section class="hero">
        <img src="images/home_page.jpg" alt="Delicious food spread on a table" />
        <div class="hero-overlay">
            <div class="hero-content">
                <h2>Welcome to My Food Blog</h2>
                <p>Discover delicious recipes and cooking tips!</p>
            </div>

            <div class="hero-search">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for recipes..." 
                    class="search-input"
                />
                <button id="searchBtn" class="search-btn-hero">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>
    </section>

    <!-- ========================================== -->
    <!-- TABBED RECIPE SECTION                     -->
    <!-- ========================================== -->
    <section class="recipe-section">
        <div class="section-header">
            <h2><i class="fas fa-utensils"></i> Explore Recipes</h2>
        </div>

        <!-- Tab Buttons -->
        <div class="tabs">
            <button class="tab-btn active" data-category="all"> All</button>
            <button class="tab-btn" data-category="vegan">Vegan</button>
            <button class="tab-btn" data-category="pasta">Pasta</button>
            <button class="tab-btn" data-category="meat">Meat</button>
            <button class="tab-btn" data-category="dessert">Dessert</button>
            <button class="tab-btn" data-category="breakfast">Breakfast</button>
            <button class="tab-btn" data-category="lunch">Lunch</button>
            <button class="tab-btn" data-category="dinner">Dinner</button>
            <button class="tab-btn" data-category="gluton-free">Gluton Free</button>
            <button class="tab-btn" data-category="cakes">Cakes</button>
        </div>

        <!-- Recipe Grid -->
        <div class="recipe-grid" id="recipeGrid">
            <!-- All recipes injected by JavaScript -->
        </div>
    </section>

    <section>
        <!--carousel seaction for newest recipes-->
    </section>

    <!--might want to add a learn about food culture and all that-->

    <!--what viewers say about our food-->

    <!-- ========================================== -->
    <!-- FOOTER                                    -->
    <!-- ========================================== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 My Food Blog. Made with <i class="fa-solid fa-heart" style="color: #ff6b35;"></i> and lots of seasoning.</p>
                <div class="social-links">
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" aria-label="Pinterest"><i class="fa-brands fa-pinterest"></i></a>
                    <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="index.js"></script>
</body>
</html>
